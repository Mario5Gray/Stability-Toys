services:
  test:
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        BACKEND: cpu
        GIT_SHA: ${GIT_SHA:-dev}
    image: harbor.lan/dreamlab-test:latest
    container_name: dreamlab-test
    env_file:
      - env.dev
    environment:
      BACKEND: cpu
      MODE_CONFIG_PATH: /conf
    # SELinux: lowercase :z applies a SHARED label. Every service below
    # extends this one, so these host paths are mounted into six containers.
    # Uppercase :Z applies a PRIVATE label per container, and concurrent
    # `compose up` makes each container relabel the same directory with its own
    # MCS category, invalidating the others — the losers then get EACCES on
    # traversal even as root. Do not change these back to :Z.
    volumes:
      - ./server:/app/server:ro,z
      - ./backends:/app/backends:ro,z
      - ./utils:/app/utils:ro,z
      - ./persistence:/app/persistence:ro,z
      - ./tests:/app/tests:ro,z
      - ./spikes:/app/spikes:ro,z
      - ./invokers:/app/invokers:ro,z
      - ${TEST_MODELS_HOST_PATH:-./models}:/models:ro,z
      - ${TEST_FS_HOST_PATH:-./store}:/store:rw,z
      - ${TEST_WORKFLOW_HOST_PATH:-./workflows}:/workflows:rw,z
      - ./conf/modes-test.yml:/conf/modes.yml:ro,z
      - ./logs:/app/logs:rw,z
      - ./htmlcov:/app/htmlcov:rw,z
    command: pytest tests/ -v --cov=backends --cov=server --cov-report=html --cov-report=term-missing

  test-cuda:
    extends: test
    platform: linux/amd64
    container_name: dreamlab-test-cuda
    runtime: nvidia
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        BACKEND: cuda
        GIT_SHA: ${GIT_SHA:-dev}
    env_file:
      - env.dev
      - env.cuda
    environment:
      BACKEND: cuda
      MODE_CONFIG_PATH: /conf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  test-unit:
    extends: test
    container_name: dreamlab-test-not-ws
    command: pytest tests/ -v -m "not ws"

  test-ws:
    extends: test
    container_name: dreamlab-test-ws
    command: pytest tests/ -m ws -v

  test-fast:
    extends: test
    container_name: dreamlab-test-fast
    command: pytest tests/ -v -m "not slow"

  test-watch:
    extends: test
    container_name: dreamlab-test-watch
    command: ptw tests/ -- -v
