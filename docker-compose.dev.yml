# docker-compose.dev.yml — fast CUDA dev builds with volume-mounted source.
#
# Prerequisite: the base image named by BASE_IMAGE below must exist and be
# current. Note the names differ: the full build produces harbor.lan/lcm-sd:latest,
# while BASE_IMAGE defaults to harbor.lan/lcm-sd-ui:latest (the tag `make
# quick-build` and the Concourse pipeline use). Building the former does not
# refresh the latter, so run one of:
#
#   docker compose -f docker-cuda.yml build \
#     && docker tag harbor.lan/lcm-sd:latest harbor.lan/lcm-sd-ui:latest
#
#   BASE_IMAGE=harbor.lan/lcm-sd:latest make dev-build && BASE_IMAGE=harbor.lan/lcm-sd:latest make dev
#
# ./Dockerfile builds the UI too, so lcm-sd:latest is complete; the -ui suffix
# is only a tag, not a different image contract.
#
# The base image owns every Python dependency; the dev image is
# docker/runtime/live-test.Dockerfile, which is FROM ${BASE_IMAGE} and only
# COPYs source — it runs no pip install. So any change to requirements*.txt
# invalidates the base and `make dev-build` cannot pick it up. Symptom is a
# ModuleNotFoundError at container start, deep in an import chain, for a package
# that is present in requirements.txt. Rebuild the base, not just the overlay.
#
# Prerequisite: pre-built UI dist (for serving the frontend):
#   cd lcm-sr-ui && yarn build
#
# Usage:
#   make dev          # start dev container (uvicorn --reload on source changes)
#   make dev-build    # rebuild dev image (source-only, seconds)
#   make dev-down     # stop dev container
#
# Reload behavior:
#   - Python source edits (.py) → auto-reloaded by uvicorn --reload
#   - modes.yaml edits under ./conf → hot-reloaded by app watchdog watcher
#   - env/base-image/model-root changes → docker compose -f docker-compose.dev.yml restart

services:
  lcm-sd:
    platform: linux/amd64
    container_name: lcm-sd-dev
    runtime: nvidia
    build:
      context: .
      dockerfile: docker/runtime/live-test.Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-harbor.lan/lcm-sd-ui:latest}
        GIT_SHA: ${GIT_SHA:-dev}
    image: lcm-sd-ui:dev
    ports:
      - "4200:4200"
    volumes:
      - ${MODELS_HOST_PATH:-./model}:/models:rw,Z
      - ${FS_HOST_PATH:-./store}:/store:rw,Z
      - ${WORKFLOW_HOST_PATH:-./workflows}:/workflows:rw,Z
      - ./conf:/conf:rw,Z
      - ./server:/app/server:rw,Z
      - ./backends:/app/backends:rw,Z
      - ./utils:/app/utils:rw,Z
      - ./persistence:/app/persistence:rw,Z
      - ./invokers:/app/invokers:rw,Z
      - ./lcm-sr-ui/dist:/opt/lcm-sr-server/ui-dist:ro,Z
    env_file:
      - env.dev
      - env.cuda
    restart: unless-stopped
    networks:
      - observ-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/docs').read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  observ-net:
    name: observ-net
    external: true
