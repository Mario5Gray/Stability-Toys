model_root: /models
lora_root: /models/loras
default_mode: lcm-general
modes:
  lcm-general:
    model: diffusers/lcm-dreamshaper-v7
    default_size: 768x768
    default_steps: 8
    default_guidance: 3
    negative_prompt_templates:
      safe_photo: "blurry, watermark, text, low quality"
      portrait: "bad anatomy, extra fingers, deformed"
    default_negative_prompt_template: safe_photo
    allow_custom_negative_prompt: true
    allowed_scheduler_ids:
      - euler
      - lcm
    default_scheduler_id: lcm    
  lcm-runwayml:
    model: diffusers/LCM-runwayml-stable-diffusion-v1-5
    default_size: 512x512
    default_steps: 8
    default_guidance: 1.5
    negative_prompt_templates:
      safe_photo: "blurry, watermark, text, low quality"
      portrait: "bad anatomy, extra fingers, deformed"
    default_negative_prompt_template: safe_photo
    allow_custom_negative_prompt: true
    allowed_scheduler_ids:
      - euler
      - lcm
    default_scheduler_id: lcm    
  SDXL:
    model: checkpoints/sdxl4GB2GBImprovedFP8_fp8FullCheckpoint.safetensors
    default_size: 512x512
    default_steps: 11
    default_guidance: 3.0
    negative_prompt_templates:
      safe_photo: "blurry, compression artifacts, bad anatomy, watermark, text, low quality"
      portrait: "bad anatomy, extra fingers, deformed"
    default_negative_prompt_template: safe_photo
    allow_custom_negative_prompt: true
    allowed_scheduler_ids:
      - ddim
      - dpmpp_2m
      - dpmpp_sde
      - euler
      - lcm
    default_scheduler_id: dpmpp_2m